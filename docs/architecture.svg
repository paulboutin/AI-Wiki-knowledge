<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1c1917">How AI-Wiki Knowledge Works</text>

  <!-- STEP 1: AI Coding Session -->
  <rect x="40" y="60" width="200" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">1. AI Coding Session</text>
  <text x="140" y="108" text-anchor="middle" font-size="11" fill="#3b82f6">Claude Code · Codex · OpenCode · Cursor</text>
  <rect x="60" y="118" width="160" height="2" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="138" text-anchor="middle" font-size="10.5" fill="#475569">You code with your AI assistant.</text>
  <text x="140" y="154" text-anchor="middle" font-size="10.5" fill="#475569">Every conversation is recorded</text>
  <text x="140" y="170" text-anchor="middle" font-size="10.5" fill="#475569">as a JSONL transcript.</text>

  <!-- STEP 2: Hooks Fire -->
  <rect x="300" y="60" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">2. Hooks Fire Automatically</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#d97706">SessionStart · SessionEnd · PreCompact</text>
  <rect x="320" y="118" width="160" height="2" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="138" text-anchor="middle" font-size="10.5" fill="#475569">SessionStart: injects knowledge</text>
  <text x="400" y="154" text-anchor="middle" font-size="10.5" fill="#475569">SessionEnd: captures transcript</text>
  <text x="400" y="170" text-anchor="middle" font-size="10.5" fill="#475569">PreCompact: safety net</text>

  <!-- STEP 3: flush.py -->
  <rect x="560" y="60" width="200" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">3. flush.py (Background)</text>
  <text x="660" y="108" text-anchor="middle" font-size="11" fill="#16a34a">Claude Agent SDK</text>
  <rect x="580" y="118" width="160" height="2" fill="#22c55e" opacity="0.3"/>
  <text x="660" y="138" text-anchor="middle" font-size="10.5" fill="#475569">Extracts decisions, lessons,</text>
  <text x="660" y="154" text-anchor="middle" font-size="10.5" fill="#475569">patterns from conversation.</text>
  <text x="660" y="170" text-anchor="middle" font-size="10.5" fill="#475569">Appends to daily log.</text>

  <!-- STEP 4: Daily Log -->
  <rect x="560" y="230" width="200" height="100" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#86198f">4. Daily Log</text>
  <text x="660" y="278" text-anchor="middle" font-size="11" fill="#a855f7">daily/YYYY-MM-DD.md</text>
  <rect x="580" y="288" width="160" height="2" fill="#a855f7" opacity="0.3"/>
  <text x="660" y="308" text-anchor="middle" font-size="10.5" fill="#475569">Append-only conversation</text>
  <text x="660" y="324" text-anchor="middle" font-size="10.5" fill="#475569">logs — the raw source material.</text>

  <!-- STEP 5: compile.py -->
  <rect x="560" y="380" width="200" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">5. compile.py</text>
  <text x="660" y="428" text-anchor="middle" font-size="11" fill="#ea580c">Auto after 6 PM or manual</text>
  <rect x="580" y="438" width="160" height="2" fill="#f97316" opacity="0.3"/>
  <text x="660" y="458" text-anchor="middle" font-size="10.5" fill="#475569">Turns daily logs into structured</text>
  <text x="660" y="474" text-anchor="middle" font-size="10.5" fill="#475569">knowledge articles.</text>

  <!-- STEP 6: Knowledge Base -->
  <rect x="300" y="380" width="200" height="100" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">6. Knowledge Base</text>
  <text x="400" y="428" text-anchor="middle" font-size="11" fill="#059669">knowledge/</text>
  <rect x="320" y="438" width="160" height="2" fill="#10b981" opacity="0.3"/>
  <text x="400" y="458" text-anchor="middle" font-size="10.5" fill="#475569">concepts/ · connections/ · qa/</text>
  <text x="400" y="474" text-anchor="middle" font-size="10.5" fill="#475569">index.md · Obsidian vault</text>

  <!-- Arrows -->
  <!-- 1 -> 2 -->
  <line x1="240" y1="120" x2="300" y2="120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="112" text-anchor="middle" font-size="9" fill="#6b7280">records</text>

  <!-- 2 -> 3 -->
  <line x1="500" y1="120" x2="560" y2="120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="112" text-anchor="middle" font-size="9" fill="#6b7280">spawns</text>

  <!-- 3 -> 4 (down) -->
  <line x1="660" y1="180" x2="660" y2="230" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="672" y="210" font-size="9" fill="#6b7280">appends</text>

  <!-- 4 -> 5 (down) -->
  <line x1="660" y1="330" x2="660" y2="380" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="672" y="360" font-size="9" fill="#6b7280">compiles</text>

  <!-- 5 -> 6 (left) -->
  <line x1="560" y1="430" x2="500" y2="430" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="422" text-anchor="middle" font-size="9" fill="#6b7280">writes</text>

  <!-- 6 -> 2 (cycle back - dashed) -->
  <path d="M 400 380 L 400 200" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)" fill="none"/>
  <text x="416" y="290" font-size="9" fill="#ea580c">injects</text>
  <text x="416" y="302" font-size="9" fill="#ea580c">context</text>

  <!-- Platform icons row -->
  <text x="140" y="210" text-anchor="middle" font-size="10" font-weight="500" fill="#6b7280">Supported Platforms:</text>
  <text x="60" y="230" font-size="10" fill="#3b82f6">● Claude Code</text>
  <text x="160" y="230" font-size="10" fill="#3b82f6">● Codex CLI</text>
  <text x="60" y="248" font-size="10" fill="#3b82f6">● OpenCode</text>
  <text x="160" y="248" font-size="10" fill="#3b82f6">● Cursor</text>

  <!-- Key insight box -->
  <rect x="40" y="300" width="200" height="130" rx="8" fill="#fffbeb" stroke="#eab308" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Why No RAG?</text>
  <rect x="60" y="332" width="160" height="1" fill="#eab308" opacity="0.3"/>
  <text x="140" y="354" text-anchor="middle" font-size="10" fill="#475569">At personal scale (50-500</text>
  <text x="140" y="368" text-anchor="middle" font-size="10" fill="#475569">articles), the LLM reading</text>
  <text x="140" y="382" text-anchor="middle" font-size="10" fill="#475569">index.md outperforms vector</text>
  <text x="140" y="396" text-anchor="middle" font-size="10" fill="#475569">similarity. The LLM finds</text>
  <text x="140" y="410" text-anchor="middle" font-size="10" fill="#475569">relevant concepts, not just</text>
  <text x="140" y="424" text-anchor="middle" font-size="10" fill="#475569">similar words.</text>
</svg>
